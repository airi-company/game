<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake Game</title>
  <style>
    :root { color-scheme: light dark; }
    body { margin:0; display:flex; align-items:center; justify-content:center; min-height:100vh; background:#0f172a; color:#e2e8f0; font-family:system-ui,sans-serif; }
    #wrap { padding:20px; border-radius:12px; background:#111827; box-shadow:0 20px 60px rgba(0,0,0,0.35); text-align:center; width: min(420px, 90vw); }
    canvas { background:#0b1222; border:1px solid #1f2937; display:block; margin:12px auto; }
    button { background:linear-gradient(135deg,#10b981,#06b6d4); border:none; color:white; padding:10px 16px; border-radius:8px; font-weight:700; cursor:pointer; }
    .row { display:flex; justify-content:space-between; align-items:center; gap:8px; }
  </style>
</head>
<body>
  <div id="wrap">
    <h2>Rắn săn mồi</h2>
    <div class="row"><div>Điểm: <span id="score">0</span></div><button id="btn">Chơi lại</button></div>
    <canvas id="c" width="360" height="360"></canvas>
    <p style="font-size:12px;opacity:0.8">Phím điều hướng: ← ↑ → ↓</p>
  </div>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const size = 20; // cell size
    const cells = canvas.width / size;
    let snake, dir, food, score, loop;

    function reset() {
      snake = [{x: 5, y: 5}];
      dir = {x:1, y:0};
      score = 0;
      placeFood();
      clearInterval(loop);
      loop = setInterval(tick, 120);
      draw();
      document.getElementById('score').textContent = score;
    }

    function placeFood() {
      food = {
        x: Math.floor(Math.random() * cells),
        y: Math.floor(Math.random() * cells)
      };
    }

    function tick() {
      const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
      // wrap
      head.x = (head.x + cells) % cells;
      head.y = (head.y + cells) % cells;
      // collision with body
      if (snake.some(p => p.x === head.x && p.y === head.y)) {
        reset();
        return;
      }
      snake.unshift(head);
      if (head.x === food.x && head.y === food.y) {
        score += 10;
        document.getElementById('score').textContent = score;
        placeFood();
      } else {
        snake.pop();
      }
      draw();
    }

    function draw() {
      ctx.fillStyle = '#0b1222';
      ctx.fillRect(0,0,canvas.width,canvas.height);
      // grid
      ctx.strokeStyle = '#1f2937';
      for(let i=0;i<cells;i++){
        ctx.beginPath(); ctx.moveTo(i*size,0); ctx.lineTo(i*size,canvas.height); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0,i*size); ctx.lineTo(canvas.width,i*size); ctx.stroke();
      }
      // food
      ctx.fillStyle = '#f97316';
      ctx.fillRect(food.x*size, food.y*size, size, size);
      // snake
      ctx.fillStyle = '#10b981';
      snake.forEach((p,i)=>{
        ctx.fillRect(p.x*size, p.y*size, size-1, size-1);
      });
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowUp' && dir.y !== 1) dir = {x:0,y:-1};
      else if (e.key === 'ArrowDown' && dir.y !== -1) dir = {x:0,y:1};
      else if (e.key === 'ArrowLeft' && dir.x !== 1) dir = {x:-1,y:0};
      else if (e.key === 'ArrowRight' && dir.x !== -1) dir = {x:1,y:0};
    });
    document.getElementById('btn').onclick = reset;
    reset();
  </script>
</body>
</html>
